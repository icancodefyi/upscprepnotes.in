<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 2cm 2.5cm;
    @top-center {
      content: element(header);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 9pt;
      color: #666;
    }
    @bottom-center {
      content: counter(page);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 9pt;
      color: #666;
    }
  }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.6;
    color: #1a1a1a;
  }

  .cover-page {
    page-break-after: always;
    text-align: center;
    padding-top: 180px;
  }

  .cover-page h1 {
    font-size: 28pt;
    color: #1a365d;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .cover-page .subtitle {
    font-size: 16pt;
    color: #4a5568;
    margin-bottom: 40px;
  }

  .cover-page .meta {
    font-size: 12pt;
    color: #718096;
    margin-top: 60px;
  }

  .cover-page .divider {
    width: 100px;
    height: 4px;
    background: #2b6cb0;
    margin: 30px auto;
    border-radius: 2px;
  }

  .toc {
    page-break-after: always;
  }

  .toc h2 {
    font-size: 20pt;
    color: #1a365d;
    border-bottom: 2px solid #2b6cb0;
    padding-bottom: 8px;
  }

  .toc ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
  }

  .toc li {
    padding: 6px 0;
    font-size: 11pt;
    border-bottom: 1px dotted #e2e8f0;
  }

  .toc li span {
    float: right;
    color: #718096;
  }

  h1 { font-size: 22pt; color: #1a365d; margin-top: 30px; margin-bottom: 15px; page-break-before: always; }
  h1:first-of-type { page-break-before: avoid; }
  h2 { font-size: 16pt; color: #2b6cb0; margin-top: 25px; margin-bottom: 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; }
  h3 { font-size: 13pt; color: #2d3748; margin-top: 20px; margin-bottom: 8px; }
  h4 { font-size: 11pt; color: #4a5568; margin-top: 15px; margin-bottom: 6px; }

  p { margin-bottom: 10px; text-align: justify; }

  ul, ol { margin-bottom: 10px; padding-left: 20px; }
  li { margin-bottom: 4px; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
    font-size: 10pt;
  }

  table th {
    background: #2b6cb0;
    color: white;
    padding: 8px 12px;
    text-align: left;
  }

  table td {
    padding: 8px 12px;
    border-bottom: 1px solid #e2e8f0;
  }

  table tr:nth-child(even) td {
    background: #f7fafc;
  }

  .tip-box {
    background: #ebf8ff;
    border-left: 4px solid #2b6cb0;
    padding: 12px 16px;
    margin: 15px 0;
    page-break-inside: avoid;
  }

  .warning-box {
    background: #fffaf0;
    border-left: 4px solid #dd6b20;
    padding: 12px 16px;
    margin: 15px 0;
    page-break-inside: avoid;
  }

  .key-point {
    background: #f0fff4;
    border-left: 4px solid #38a169;
    padding: 12px 16px;
    margin: 15px 0;
    page-break-inside: avoid;
  }

  .page-break { page-break-before: always; }

  @media print {
    a { color: #2b6cb0; text-decoration: none; }
  }
</style>
</head>
<body>
__CONTENT__
</body>
</html>
